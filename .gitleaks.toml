[extend]
useDefault = true

[[rules]]
id = "flask-secret-key"
description = "Flask or session SECRET_KEY hardcoded"
regex = '''(?i)(secret_key|session_secret)\s*[:=]\s*['\"]([^'\"]{4,})['\"]'''
tags = ["flask", "secret"]

[[rules]]
id = "jwt-secret"
description = "JWT secret hardcoded"
regex = '''(?i)(jwt_secret|jwt_key)\s*[:=]\s*['\"]([^'\"]{4,})['\"]'''
tags = ["jwt", "secret"]

[[rules]]
id = "db-password"
description = "Database password hardcoded"
regex = '''(?i)(db_password|postgres_password)\s*[:=]\s*['\"]([^'\"]{4,})['\"]'''
tags = ["database", "secret"]

[allowlist]
description = "Allowlist for Vault templates, documented vulnerabilities, and upstream baseline commit"
paths = [
  "VULNERABILITIES.md",
  ".env.example",
  "infra/kubernetes/overlays/dev/auth-service.yaml",
  "infra/kubernetes/overlays/dev/transaction-service.yaml",
  "infra/kubernetes/overlays/dev/frontend.yaml",
  "infra/terraform/main.tf",
  "infra/kubernetes/base/configmap.yaml"
]
commits = [
  "67266955dcf23e18c7753647ce7ec9c1bacf0459"
]
