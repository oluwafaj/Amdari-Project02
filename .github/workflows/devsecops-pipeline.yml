name: DevSecOps Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  secret-scan:
    name: Stage 1 - Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --log-opts="--all" --report-format json --report-path gitleaks-report.json --exit-code 1
      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  sast-scan:
    name: Stage 2 - SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-findings
          path: .scannerwork/report-task.txt
  image-scan:
    name: Stage 3 - Trivy Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build auth-service image
        run: docker build -t auth-service:test ./services/auth-service

      - name: Build transaction-service image
        run: docker build -t transaction-service:test ./services/transaction-service

      - name: Build frontend image
        run: docker build -t frontend:test ./services/frontend

      - name: Scan auth-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: auth-service:test
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Scan transaction-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: transaction-service:test
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:test
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH


  iac-scan:
    name: Stage 4 - Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov on Terraform
        run: |
          checkov -d infra/terraform \
            --severity high \
            --compact \
            --output cli \
            --soft-fail-on MEDIUM \
            --hard-fail-on HIGH,CRITICAL
        continue-on-error: false

      - name: Run Trivy on K8s manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/kubernetes
          severity: CRITICAL,HIGH
          exit-code: 1


  security-gate:
    name: Stage 5 - Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, image-scan, iac-scan]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Gitleaks report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
        continue-on-error: true

      - name: Run Security Gate
        run: |
          chmod +x pipeline/scripts/security-gate.sh
          bash pipeline/scripts/security-gate.sh

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔐 Security Gate Summary
            
            ### ❌ DevSecOps-Owned Findings (Blocking)
            | Scanner | Status | Action |
            |---------|--------|--------|
            | Gitleaks | ❌ Secrets found | Rotate credentials immediately |
            | Trivy | ❌ CVEs found | Upgrade base image |
            | Checkov | ❌ IaC misconfigs | Fix Terraform modules |
            
            ### ⚠️ AppSec-Owned Findings (Non-Blocking)
            | Scanner | Status | Owner |
            |---------|--------|-------|
            | SonarQube | ⚠️ Issues found | AppSec Team |
            
            > Merge is blocked until DevSecOps findings are resolved.
            > AppSec findings have been routed to the security team.`
            })
