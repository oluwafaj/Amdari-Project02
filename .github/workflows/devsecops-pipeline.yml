sast-scan:
    name: Stage 2 - SonarQube SAST
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Export SonarQube findings
        run: |
          curl -s -u ${{ secrets.SONAR_TOKEN }}: \
            "https://sonarcloud.io/api/issues/search?projectKeys=oluwafaj_Amdari-Project02&severities=CRITICAL,BLOCKER&resolved=false" \
            -o sonar-critical.json
          
          CRITICAL_COUNT=$(cat sonar-critical.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('total', 0))")
          echo "Critical/Blocker findings: $CRITICAL_COUNT"
          
          if [ "$CRITICAL_COUNT" -gt "0" ]; then
            echo "SONAR_GATE=FAILED" >> $GITHUB_ENV
          else
            echo "SONAR_GATE=PASSED" >> $GITHUB_ENV
          fi

      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-findings
          path: sonar-critical.json

      - name: Hard-fail on CRITICAL/BLOCKER only
        if: env.SONAR_GATE == 'FAILED'
        run: |
          echo "Pipeline hard-failing on CRITICAL/BLOCKER SonarQube findings"
          exit 1
