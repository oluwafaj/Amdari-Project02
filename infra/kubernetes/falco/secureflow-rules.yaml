customRules:
  secureflow-rules.yaml: |-
    # Rule 1 — Shell spawn inside a SecureFlow service container
    # Detects: attacker using SQL injection to get code execution
    - rule: Shell Spawned in SecureFlow Container
      desc: A shell was spawned inside a SecureFlow service container. This may indicate exploitation of SQL injection or XSS vulnerabilities.
      condition: >
        spawned_process and
        container and
        container.label[io.kubernetes.pod.namespace] = "secureflow" and
        proc.name in (shell_binaries)
      output: >
        Shell spawned in SecureFlow container
        (user=%user.name user_id=%user.uid command=%proc.cmdline
        pid=%proc.pid container=%container.name
        image=%container.image.repository pod=%k8s.pod.name
        namespace=%k8s.ns.name)
      priority: CRITICAL
      tags: [secureflow, shell, exploitation]

    # Rule 2 — Sensitive file read inside SecureFlow container
    # Detects: attacker reading /etc/shadow or other sensitive files
    - rule: Sensitive File Read in SecureFlow
      desc: A sensitive file was read inside a SecureFlow container. Possible credential theft attempt.
      condition: >
        open_read and
        container and
        container.label[io.kubernetes.pod.namespace] = "secureflow" and
        fd.name in (/etc/shadow, /etc/passwd, /etc/sudoers, /root/.ssh/id_rsa)
      output: >
        Sensitive file read in SecureFlow container
        (user=%user.name command=%proc.cmdline
        file=%fd.name container=%container.name
        pod=%k8s.pod.name namespace=%k8s.ns.name)
      priority: CRITICAL
      tags: [secureflow, sensitive-file, credential-theft]

    # Rule 3 — Unexpected outbound connection from SecureFlow
    # Detects: post-exploitation C2 channel or data exfiltration
    - rule: Unexpected Outbound Connection in SecureFlow
      desc: A SecureFlow container established an unexpected outbound connection. Possible C2 channel or data exfiltration.
      condition: >
        outbound and
        container and
        container.label[io.kubernetes.pod.namespace] = "secureflow" and
        not fd.sport in (5000, 5001, 5002, 5432, 5433, 443, 80)
      output: >
        Unexpected outbound connection from SecureFlow container
        (user=%user.name command=%proc.cmdline
        connection=%fd.name container=%container.name
        pod=%k8s.pod.name namespace=%k8s.ns.name)
      priority: CRITICAL
      tags: [secureflow, network, exfiltration]

    # Rule 4 — Package manager execution inside SecureFlow container
    # Detects: attacker installing tools after gaining access
    - rule: Package Manager Executed in SecureFlow
      desc: A package manager was executed inside a SecureFlow container. Attackers install tools after gaining access.
      condition: >
        spawned_process and
        container and
        container.label[io.kubernetes.pod.namespace] = "secureflow" and
        proc.name in (package_mgmt_binaries)
      output: >
        Package manager executed in SecureFlow container
        (user=%user.name command=%proc.cmdline
        container=%container.name pod=%k8s.pod.name
        namespace=%k8s.ns.name)
      priority: CRITICAL
      tags: [secureflow, package-manager, post-exploitation]
